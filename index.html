<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Order System</title>
    <!-- Mobile App Settings for PWA and Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quick Order System" />
    <meta name="application-name" content="Quick Order System" />
    
    <!-- App Icons and Favicons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" type="image/png" href="/logo.png" />
    
    <!-- iOS Add to Home Screen Icons (Replaces the letter 'Q') -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    
    <!-- Web App Manifest (Static link for early browser pre-scanners like iOS Safari, with script to append query parameters immediately) -->
    <link id="pwa-manifest" rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        // Universal function to synchronize dynamic PWA manifest and cookies with current storage
        function updateManifestHref() {
          var activeOrgId = localStorage.getItem('quickorder_last_org_id') || '';
          var activeView = localStorage.getItem('quickorder_last_view') || 'customer';
          
          if (activeOrgId) {
            // Guarantee cookies are always kept in perfect sync for server-side manifest rendering
            var currentOrgCookie = "quickorder_last_org_id=" + encodeURIComponent(activeOrgId) + "; path=/; max-age=31536000; SameSite=Lax";
            var currentViewCookie = "quickorder_last_view=" + encodeURIComponent(activeView) + "; path=/; max-age=31536000; SameSite=Lax";
            document.cookie = currentOrgCookie;
            document.cookie = currentViewCookie;

            var link = document.getElementById('pwa-manifest');
            if (link) {
              var targetHref = '/manifest.json?orgId=' + encodeURIComponent(activeOrgId) + '&view=' + encodeURIComponent(activeView);
              if (link.getAttribute('href') !== targetHref) {
                link.href = targetHref;
                console.log('[Dynamic PWA] Manifest link synchronized to:', targetHref);
              }
            }
          }
        }

        // Parse params from query parameters
        var params = new URLSearchParams(window.location.search);
        var urlOrgId = params.get('orgId');
        var urlView = params.get('view');
        
        if (urlOrgId) {
          localStorage.setItem('quickorder_last_org_id', urlOrgId);
        }
        if (urlView) {
          localStorage.setItem('quickorder_last_view', urlView);
        }

        // Initial synchronization
        updateManifestHref();

        // Intercept local state updates directly (monkeypatch) to respond instantly
        var originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
          try {
            originalSetItem.apply(this, arguments);
          } catch(e) {
            // Fallback if needed
          }
          if (key === 'quickorder_last_org_id' || key === 'quickorder_last_view') {
            updateManifestHref();
          }
        };

        // Listen for standard storage event (multi-tab change synchronization)
        window.addEventListener('storage', function(e) {
          if (e.key === 'quickorder_last_org_id' || e.key === 'quickorder_last_view') {
            updateManifestHref();
          }
        });

        // Fail-safe periodic polling/cleanup loop to ensure perfect sync
        setInterval(updateManifestHref, 1000);
      })();
    </script>
    <meta name="theme-color" content="#020617" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
