<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Order System</title>
    <!-- Mobile App Settings for PWA and Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quick Order System" />
    <meta name="application-name" content="Quick Order System" />
    
    <!-- App Icons and Favicons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" type="image/png" href="/logo.png" />
    
    <!-- iOS Add to Home Screen Icons (Replaces the letter 'Q') -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    
    <!-- Web App Manifest (Static link for early browser pre-scanners like iOS Safari, with script to append query parameters immediately) -->
    <link id="pwa-manifest" rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        // Parse params from query parameters
        var params = new URLSearchParams(window.location.search);
        var orgId = params.get('orgId');
        var view = params.get('view') || 'customer';
        
        if (orgId) {
          // Set in cookies instantly so the very first fetch of manifest.json will include it!
          document.cookie = "quickorder_last_org_id=" + encodeURIComponent(orgId) + "; path=/; max-age=31536000; SameSite=Lax";
          localStorage.setItem('quickorder_last_org_id', orgId);
        } else {
          var savedOrgId = localStorage.getItem('quickorder_last_org_id');
          if (savedOrgId) {
            document.cookie = "quickorder_last_org_id=" + encodeURIComponent(savedOrgId) + "; path=/; max-age=31536000; SameSite=Lax";
          }
        }
        
        if (view) {
          document.cookie = "quickorder_last_view=" + encodeURIComponent(view) + "; path=/; max-age=31536000; SameSite=Lax";
          localStorage.setItem('quickorder_last_view', view);
        } else {
          var savedView = localStorage.getItem('quickorder_last_view');
          if (savedView) {
            document.cookie = "quickorder_last_view=" + encodeURIComponent(savedView) + "; path=/; max-age=31536000; SameSite=Lax";
          }
        }

        var link = document.getElementById('pwa-manifest');
        if (link) {
          var activeOrgId = orgId || localStorage.getItem('quickorder_last_org_id') || '';
          var activeView = view || localStorage.getItem('quickorder_last_view') || 'customer';
          if (activeOrgId) {
            link.href = '/manifest.json?orgId=' + encodeURIComponent(activeOrgId) + '&view=' + encodeURIComponent(activeView);
          }
        }
      })();
    </script>
    <meta name="theme-color" content="#020617" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
